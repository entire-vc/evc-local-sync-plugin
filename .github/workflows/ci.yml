# CI — EVC Local Sync Obsidian Plugin
# Based on F3 ci-ts-plugin template (bob/docs/ci-templates/ci-ts-plugin.yml)
#
# CI_MODE repo variable (Settings → Variables):
#   REPORT  — failures annotate the PR but do NOT block merge (default, Phase 1 burn-in)
#   ENFORCE — failures block merge (flip after 3-day green burn-in)

name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  NODE_VERSION: "20"
  COVERAGE_THRESHOLD: "80"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  # ── Type-check ──────────────────────────────────────────────────────────────
  type-check:
    name: "TypeScript type-check"
    runs-on: ubuntu-latest
    continue-on-error: ${{ vars.CI_MODE != 'ENFORCE' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: tsc --noEmit
        run: npx tsc --noEmit --skipLibCheck

  # ── Unit + integration tests + coverage ────────────────────────────────────
  unit-coverage:
    name: "Jest (unit + integration) ≥${{ env.COVERAGE_THRESHOLD }}% coverage"
    runs-on: ubuntu-latest
    continue-on-error: ${{ vars.CI_MODE != 'ENFORCE' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci

      - name: Run Jest with coverage
        run: |
          npx jest \
            --coverage \
            --coverageThreshold='{"global":{"lines":${{ env.COVERAGE_THRESHOLD }},"branches":${{ env.COVERAGE_THRESHOLD }}}}' \
            --forceExit \
            --passWithNoTests

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jest-coverage-local-sync
          path: coverage/

  # ── Build smoke ─────────────────────────────────────────────────────────────
  build-smoke:
    name: "Build + smoke"
    runs-on: ubuntu-latest
    continue-on-error: ${{ vars.CI_MODE != 'ENFORCE' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build plugin
        run: npm run build
      - name: Verify main.js produced
        run: test -f main.js && echo "build OK"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: local-sync-dist
          path: main.js

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: "ESLint"
    runs-on: ubuntu-latest
    continue-on-error: ${{ vars.CI_MODE != 'ENFORCE' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint

  # ── Gate ────────────────────────────────────────────────────────────────────
  ci-gate:
    name: "CI gate (${{ vars.CI_MODE || 'REPORT' }} mode)"
    runs-on: ubuntu-latest
    needs: [type-check, unit-coverage, build-smoke, lint]
    if: always()
    steps:
      - name: Check outcomes
        run: |
          MODE="${{ vars.CI_MODE || 'REPORT' }}"
          TC="${{ needs.type-check.result }}"
          UC="${{ needs.unit-coverage.result }}"
          BS="${{ needs.build-smoke.result }}"
          LN="${{ needs.lint.result }}"
          echo "Mode=$MODE  type-check=$TC  unit-coverage=$UC  build-smoke=$BS  lint=$LN"
          if [ "$MODE" = "ENFORCE" ]; then
            if [ "$TC" != "success" ] || [ "$UC" != "success" ] || \
               [ "$BS" != "success" ] || [ "$LN" != "success" ]; then
              echo "::error::One or more CI gates failed in ENFORCE mode."
              exit 1
            fi
          else
            echo "REPORT mode — failures are informational. Flip CI_MODE=ENFORCE after 3-day green burn-in."
          fi
