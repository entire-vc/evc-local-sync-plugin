# CI — EVC Local Sync Obsidian Plugin
# Based on F3 ci-ts-plugin template (bob/docs/ci-templates/ci-ts-plugin.yml)
#
# Burn-in mode: all jobs use continue-on-error: true (non-blocking REPORT).
# To flip to ENFORCE: set continue-on-error: false on each job and set
# CI_MODE=ENFORCE in repo Settings → Variables → Actions.

name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  # ── Type-check ──────────────────────────────────────────────────────────────
  type-check:
    name: "TypeScript type-check"
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: tsc --noEmit
        run: npx tsc --noEmit --skipLibCheck

  # ── Unit + integration tests + coverage ────────────────────────────────────
  unit-coverage:
    name: "Jest (unit + integration) + coverage report"
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
      - run: npm ci

      - name: Run Jest with coverage
        run: |
          npx jest \
            --coverage \
            --forceExit \
            --passWithNoTests

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: jest-coverage-local-sync
          path: coverage/

  # ── Build smoke ─────────────────────────────────────────────────────────────
  build-smoke:
    name: "Build + smoke"
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Build plugin
        run: npm run build
      - name: Verify main.js produced
        run: test -f main.js && echo "build OK"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: local-sync-dist
          path: main.js

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: "ESLint"
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint

  # ── Manifest version check ──────────────────────────────────────────────────
  manifest-check:
    name: "manifest.json version sync + monotonicity"
    runs-on: ubuntu-latest
    continue-on-error: false

    steps:
      - uses: actions/checkout@v7

      - name: Verify manifest.json matches package.json
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          MFT_VER=$(node -p "require('./manifest.json').version")
          MFT_MIN=$(node -p "require('./manifest.json').minAppVersion")
          echo "package.json:   $PKG_VER"
          echo "manifest.json:  $MFT_VER  (minAppVersion: $MFT_MIN)"
          if [ "$PKG_VER" != "$MFT_VER" ]; then
            echo "::error::manifest.json version ($MFT_VER) != package.json version ($PKG_VER). Manually fix manifest.json."
            exit 1
          fi
          if ! grep -q "\"$MFT_VER\"" versions.json; then
            echo "::error::versions.json is missing entry for $MFT_VER. Add it before releasing."
            exit 1
          fi
          echo "OK: manifest.json, package.json, versions.json all agree on $PKG_VER"

      - name: Monotonicity guard — version must be strictly greater than latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=$(gh api /repos/${{ github.repository }}/releases/latest --jq '.tag_name' 2>/dev/null || echo "0.0.0")
          LATEST_VER="${LATEST_TAG#v}"
          CUR_VER=$(node -p "require('./manifest.json').version")
          echo "Latest published release: $LATEST_VER"
          echo "Current manifest version: $CUR_VER"
          version_gt() {
            [ "$(printf '%s\n%s' "$1" "$2" | sort -V | tail -1)" = "$1" ] && [ "$1" != "$2" ]
          }
          if ! version_gt "$CUR_VER" "$LATEST_VER"; then
            echo "::error::Version $CUR_VER is not strictly greater than latest published release $LATEST_VER. Bump the version monotonically."
            exit 1
          fi
          echo "OK: $CUR_VER > $LATEST_VER (monotonically increasing)"

  # ── Gate ────────────────────────────────────────────────────────────────────
  ci-gate:
    name: "CI gate"
    runs-on: ubuntu-latest
    needs: [type-check, unit-coverage, build-smoke, lint, manifest-check]
    if: always()
    steps:
      - name: Check outcomes
        run: |
          MODE="${{ vars.CI_MODE || 'REPORT' }}"
          TC="${{ needs.type-check.result }}"
          UC="${{ needs.unit-coverage.result }}"
          BS="${{ needs.build-smoke.result }}"
          LN="${{ needs.lint.result }}"
          MC="${{ needs.manifest-check.result }}"
          echo "Mode=$MODE  type-check=$TC  unit-coverage=$UC  build-smoke=$BS  lint=$LN  manifest-check=$MC"
          if [ "$MC" != "success" ]; then
            echo "::error::manifest-check always enforced (version drift + monotonicity prevention)."
            exit 1
          fi
          if [ "$MODE" = "ENFORCE" ]; then
            if [ "$TC" != "success" ] || [ "$UC" != "success" ] || \
               [ "$BS" != "success" ] || [ "$LN" != "success" ]; then
              echo "::error::One or more CI gates failed in ENFORCE mode."
              exit 1
            fi
          else
            echo "REPORT mode — failures are informational. Flip CI_MODE=ENFORCE after 3-day green burn-in."
          fi
